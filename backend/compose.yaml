services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: chef_stol
      POSTGRES_USER: chef_stol
      POSTGRES_PASSWORD: chef_stol
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chef_stol"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://chef_stol:chef_stol@db:5432/chef_stol?sslmode=disable
      HTTP_ADDR: ":8080"
    ports:
      - "8080:8080"

volumes:
  db-data:
